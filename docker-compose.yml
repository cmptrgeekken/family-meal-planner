version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: family-meal-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_meal_planner}
      POSTGRES_USER: ${POSTGRES_USER:-mealplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealplanner}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: family-meal-planner-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mealplanner}:${POSTGRES_PASSWORD:-mealplanner}@db:5432/${POSTGRES_DB:-family_meal_planner}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: family-meal-planner-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres-data:
